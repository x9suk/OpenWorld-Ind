version: '3.8'
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    volumes:
      - openworld-data:/app/apps/api/data
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:4000/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  openworld-data:
